apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: crisislens-frontend
  labels:
    app: crisislens
    component: frontend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 100
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/crisislens/frontend:latest
          ports:
            - containerPort: 8080
          env:
            - name: VITE_API_BASE_URL
              value: https://crisislens-backend-HASH-REGION.a.run.app/api/v1
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
